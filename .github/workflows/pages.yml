name: pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build graph and app
        run: |
          npm run graph:build
          npm run app:build

      - name: Assemble site (app + demo workspace data)
        run: |
          cp -r state reviews wiki sources indexes dist/product-app/
          cat > dist/product-app/index.html <<'HTML'
          <!doctype html>
          <meta charset="utf-8">
          <meta http-equiv="refresh" content="0; url=./app/">
          <title>Groundplane</title>
          <a href="./app/">Open Groundplane</a>
          HTML

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/product-app

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
