name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: npm ci

      - name: Verify (graph build, contract tests, world model, graph assertions, leak scan, app build)
        run: npm run verify:local
        env:
          LEAK_SCAN_EXTRA: ${{ secrets.LEAK_SCAN_EXTRA }}

      - name: Graph determinism — rebuild must not change the committed index
        run: |
          npm run graph:build
          git diff --exit-code -- indexes/

      - name: Check whitespace
        run: git diff --check

  browser-qa:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Fixture-based browser QA (structural invariants + browser-write invariant)
        run: npm run test:browser
